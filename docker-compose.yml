

version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/usr/src/app
      - mediafiles:/usr/src/app/mediafiles
    ports:
      - "8000:8000"
    env_file:
      - env.env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
    environment:
      CHOKIDAR_USEPOLLING: "true"
      DEBUG: no-debug
    ports:
      - "3000:3000"
    restart: always

  nginx:
    image: nginx:latest
    volumes:
      - /root/Production/Seacole-Software/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /root/Production/Seacole-Software/frontend/build:/usr/src/app/frontend/build
      - /root/Production/Seacole-Software/backend/static:/usr/src/app/backend/static
      - /root/Production/Seacole-Software/backend/mediafiles:/usr/src/app/backend/mediafiles
      - /etc/letsencrypt:/etc/letsencrypt:ro
      
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend

volumes:
  mediafiles:
