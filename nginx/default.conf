# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name seacolehealthsystems.co.uk www.seacolehealthsystems.co.uk;

    # Redirect all traffic to HTTPS
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name seacolehealthsystems.co.uk www.seacolehealthsystems.co.uk;

    # SSL certificates from Let's Encrypt
    ssl_certificate /etc/letsencrypt/live/www.seacolehealthsystems.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.seacolehealthsystems.co.uk/privkey.pem;

    # Security settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Frontend React build
    root /usr/src/app/frontend/build;
    index index.html index.htm;

    location / {
        try_files $uri /index.html;
    }

    # Static files from Django
    location /static/ {
        alias /usr/src/app/frontend/build/static/;
    }

    # Media files from Django
    location /mediafiles/ {
        alias /usr/src/app/backend/mediafiles/;
        autoindex on;
    }

    # API proxy to backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Custom error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }

    # Optional: increase buffer sizes for large requests
    client_max_body_size 50M;
}

