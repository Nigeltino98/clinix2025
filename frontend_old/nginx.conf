worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Redirect all HTTP traffic to HTTPS
    server {
        listen 80;
        server_name seacolehealthsystems.co.uk www.seacolehealthsystems.co.uk;
        return 301 https://$host$request_uri;
    }

    # HTTPS Server
    server {
        listen 443 ssl;
        server_name seacolehealthsystems.co.uk www.seacolehealthsystems.co.uk;

        # SSL Certificates
        ssl_certificate     /etc/letsencrypt/live/www.seacolehealthsystems.co.uk/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/www.seacolehealthsystems.co.uk/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # React frontend
        root /root/Production/Seacole-Software/frontend/clinix/build;
        index index.html index.htm;

        location / {
            try_files $uri /index.html;
        }

        # Django API backend
        location /api/ {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Serve static files
        location /static/ {
            alias /root/Production/Seacole-Software/backend/static/;
            autoindex on;
        }

        # Serve media files
        location /mediafiles/ {
            alias /root/Production/Seacole-Software/backend/mediafiles/;
            autoindex on;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}

